<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}博客{% endblock %}</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f5f7fb;
            --panel: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #dbe3f0;
            --shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
            color: var(--text);
        }

        .wrapper {
            width: min(920px, calc(100% - 32px));
            margin: 0 auto;
            padding: 48px 0 72px;
        }

        .hero {
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 12px;
            font-size: clamp(30px, 4vw, 42px);
        }

        .hero p {
            margin: 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.8;
        }

        .hero-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 18px;
        }

        .post-card,
        .detail-card,
        .empty-state {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            box-shadow: var(--shadow);
        }

        .post-card + .post-card {
            margin-top: 20px;
        }

        .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 14px;
        }

        h2 {
            margin: 0 0 18px;
            font-size: 28px;
        }

        h2 a {
            color: inherit;
            text-decoration: none;
        }

        h2 a:hover {
            color: var(--primary);
        }

        .post-body,
        .detail-body {
            font-size: 16px;
            line-height: 1.9;
            color: #374151;
        }

        .detail-body {
            margin-top: 20px;
        }

        .button,
        .back-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 999px;
            background: var(--primary);
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            border: none;
        }

        .button:hover,
        .back-link:hover {
            background: var(--primary-hover);
        }

        .back-link {
            background: #e5edff;
            color: var(--primary);
        }

        .back-link:hover {
            background: #d9e6ff;
        }

        .empty-state h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }

        @media (max-width: 640px) {
            .wrapper {
                width: min(100% - 20px, 920px);
                padding-top: 28px;
            }

            .post-card,
            .detail-card,
            .empty-state {
                padding: 20px;
                border-radius: 16px;
            }

            h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <main class="wrapper">
        <header class="hero">
            <h1>{% block page_title %}博客{% endblock %}</h1>
            <p>{% block page_intro %}欢迎来到博客。{% endblock %}</p>
            {% block hero_actions %}{% endblock %}
        </header>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
