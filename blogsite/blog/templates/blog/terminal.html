{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Linux Terminal</title>
    <link rel="stylesheet" href="{% static 'blog/vendor/xterm/xterm.css' %}">
    <style>
        :root {
            --app-height: 100dvh;
            --bg: #050b10;
            --panel: rgba(10, 21, 29, 0.9);
            --panel-strong: rgba(6, 14, 20, 0.96);
            --line: rgba(112, 205, 241, 0.18);
            --line-strong: rgba(112, 205, 241, 0.34);
            --text: #e5f8ff;
            --muted: #8fb3c2;
            --accent: #6de0ff;
            --accent-strong: #8df9d2;
            --danger: #ff8b7f;
            --shadow: 0 16px 48px rgba(0, 0, 0, 0.28);
            --mono: "JetBrains Mono", "Cascadia Code", "SFMono-Regular", Consolas, monospace;
            --sans: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top right, rgba(109, 224, 255, 0.12), transparent 26%),
                radial-gradient(circle at bottom left, rgba(141, 249, 210, 0.1), transparent 22%),
                linear-gradient(180deg, #061018 0%, #04090e 58%, #02060a 100%);
            color: var(--text);
            font-family: var(--sans);
        }

        body {
            min-height: var(--app-height);
        }

        button,
        textarea {
            font: inherit;
        }

        .terminal-app {
            min-height: var(--app-height);
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 8px;
            padding:
                max(8px, env(safe-area-inset-top))
                8px
                calc(8px + env(safe-area-inset-bottom))
                8px;
        }

        .statusbar,
        .composer,
        .terminal-shell {
            border: 1px solid var(--line);
            background: var(--panel);
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .statusbar,
        .composer {
            border-radius: 18px;
        }

        .statusbar {
            padding: 10px 12px;
            display: grid;
            gap: 8px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            border: 1px solid var(--line);
            color: var(--muted);
            background: rgba(255, 255, 255, 0.03);
            font: 600 11px/1 var(--mono);
            letter-spacing: 0.02em;
        }

        .chip.is-live {
            color: #03202b;
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        }

        .chip-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: currentColor;
        }

        .session-meta {
            min-width: 0;
            flex: 1;
            display: grid;
            gap: 2px;
        }

        .session-meta strong {
            font-size: 13px;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-meta span {
            color: var(--muted);
            font: 500 11px/1.35 var(--mono);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .top-actions {
            display: flex;
            gap: 6px;
            flex: 0 0 auto;
        }

        .mini-button,
        .tool-button,
        .send-button {
            border: 1px solid var(--line);
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
            cursor: pointer;
            transition: transform 120ms ease, border-color 120ms ease, background 120ms ease;
        }

        .mini-button:active,
        .tool-button:active,
        .send-button:active {
            transform: scale(0.98);
        }

        .mini-button {
            min-height: 34px;
            padding: 0 12px;
            border-radius: 12px;
        }

        .tool-button {
            min-height: 34px;
            padding: 0 12px;
            border-radius: 11px;
            flex: 0 0 auto;
        }

        .mini-button.is-primary,
        .send-button,
        .tool-button.is-primary {
            color: #04212b;
            font-weight: 700;
            border-color: transparent;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        }

        .mini-button.is-danger,
        .tool-button.is-danger {
            color: var(--danger);
            border-color: rgba(255, 139, 127, 0.26);
            background: rgba(255, 139, 127, 0.08);
        }

        .terminal-shell {
            position: relative;
            min-height: 0;
            border-radius: 20px;
            overflow: hidden;
            background:
                linear-gradient(rgba(255, 255, 255, 0.015), rgba(255, 255, 255, 0)),
                var(--panel-strong);
        }

        .terminal-viewport {
            width: 100%;
            height: 100%;
            min-height: 0;
            padding: 10px;
            background: #02070c;
        }

        .terminal-overlay {
            position: absolute;
            left: 10px;
            right: 10px;
            top: 10px;
            z-index: 2;
            padding: 9px 10px;
            border-radius: 12px;
            border: 1px solid var(--line-strong);
            background: rgba(6, 16, 24, 0.92);
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
            pointer-events: none;
        }

        .terminal-overlay.is-hidden {
            display: none;
        }

        .composer {
            padding: 8px;
            display: grid;
            gap: 8px;
        }

        .toolbar {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .toolbar::-webkit-scrollbar {
            display: none;
        }

        .command-form {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: end;
        }

        .command-box {
            width: 100%;
            min-height: 46px;
            max-height: 92px;
            resize: none;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: rgba(3, 10, 15, 0.9);
            color: var(--text);
            padding: 12px;
            font: 500 13px/1.45 var(--mono);
            outline: none;
        }

        .command-box:focus {
            border-color: rgba(109, 224, 255, 0.52);
            box-shadow: 0 0 0 3px rgba(109, 224, 255, 0.12);
        }

        .send-button {
            min-width: 74px;
            min-height: 46px;
            border-radius: 14px;
        }

        .status-note {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: var(--muted);
            font-size: 11px;
            line-height: 1.35;
        }

        .status-note strong {
            color: var(--text);
            font-weight: 600;
        }

        .xterm {
            padding: 0;
        }

        .xterm-viewport {
            overscroll-behavior: contain;
        }

        @media (max-width: 640px) {
            .terminal-app {
                gap: 7px;
            }

            .statusbar {
                padding: 9px 10px;
            }

            .status-row {
                flex-wrap: wrap;
            }

            .session-meta {
                width: 100%;
                order: 2;
            }

            .top-actions {
                margin-left: auto;
            }

            .terminal-viewport {
                padding: 8px;
            }

            .command-box {
                font-size: 12.5px;
            }

            .status-note {
                font-size: 10.5px;
            }
        }
    </style>
</head>
<body>
    <div
        class="terminal-app"
        data-terminal-root
        data-ws-url="{{ terminal_ws_url }}"
        data-profile="{{ terminal_profile }}"
        data-active="{% if terminal_active %}true{% else %}false{% endif %}"
    >
        <header class="statusbar">
            <div class="status-row">
                <span class="chip {% if terminal_active %}is-live{% endif %}" data-badge-active>
                    <span class="chip-dot" aria-hidden="true"></span>
                    <span data-status-label>{% if terminal_active %}active{% else %}idle{% endif %}</span>
                </span>
                <span class="chip" data-badge-profile>{{ terminal_profile }}</span>
                <span class="chip">tmux</span>
            </div>
            <div class="status-row">
                <div class="session-meta">
                    <strong data-meta-program>{% if terminal_active %}connecting...{% else %}session idle{% endif %}</strong>
                    <span data-meta-cwd>waiting for terminal session</span>
                </div>
                <div class="top-actions">
                    <button class="mini-button is-primary" type="button" data-action="reconnect">重连</button>
                    <button class="mini-button is-danger" type="button" data-action="close">关闭</button>
                </div>
            </div>
        </header>

        <main class="terminal-shell">
            <div class="terminal-overlay" data-terminal-overlay>正在连接终端...</div>
            <div class="terminal-viewport" data-terminal-screen></div>
        </main>

        <footer class="composer">
            <div class="toolbar">
                <button class="tool-button" type="button" data-key="ctrl-c">Ctrl-C</button>
                <button class="tool-button" type="button" data-key="enter">Enter</button>
                <button class="tool-button" type="button" data-key="tab">Tab</button>
                <button class="tool-button" type="button" data-key="up">Up</button>
                <button class="tool-button" type="button" data-key="down">Down</button>
                <button class="tool-button" type="button" data-key="left">Left</button>
                <button class="tool-button" type="button" data-key="right">Right</button>
                <button class="tool-button" type="button" data-action="clear-screen">清屏</button>
            </div>

            <form class="command-form" data-command-form>
                <textarea
                    class="command-box"
                    name="command"
                    data-command-input
                    placeholder="输入命令，例如：pwd&#10;docker ps"
                    spellcheck="false"
                    autocorrect="off"
                    autocapitalize="off"
                ></textarea>
                <button class="send-button" type="submit">发送</button>
            </form>

            <div class="status-note">
                <strong data-footer-status>准备连接</strong>
                <span>Ctrl + Enter 发送</span>
            </div>
        </footer>
    </div>

    <script src="{% static 'blog/vendor/xterm/xterm.js' %}"></script>
    <script src="{% static 'blog/vendor/xterm/addon-fit.js' %}"></script>
    <script>
        (() => {
            const root = document.querySelector("[data-terminal-root]");
            if (!root || !window.Terminal || !window.FitAddon) {
                return;
            }

            const wsPath = root.dataset.wsUrl;
            const initialProfile = root.dataset.profile || "shell";
            const initialActive = root.dataset.active === "true";

            const screen = root.querySelector("[data-terminal-screen]");
            const overlay = root.querySelector("[data-terminal-overlay]");
            const form = root.querySelector("[data-command-form]");
            const input = root.querySelector("[data-command-input]");
            const badgeProfile = root.querySelector("[data-badge-profile]");
            const badgeActive = root.querySelector("[data-badge-active]");
            const statusLabel = root.querySelector("[data-status-label]");
            const metaProgram = root.querySelector("[data-meta-program]");
            const metaCwd = root.querySelector("[data-meta-cwd]");
            const footerStatus = root.querySelector("[data-footer-status]");

            const term = new Terminal({
                convertEol: true,
                cursorBlink: true,
                disableStdin: true,
                fontFamily: '"JetBrains Mono", "Cascadia Code", monospace',
                fontSize: window.innerWidth <= 720 ? 13 : 14,
                lineHeight: 1.22,
                scrollback: 1500,
                theme: {
                    background: "#02070c",
                    foreground: "#dff7ff",
                    cursor: "#6de0ff",
                    cursorAccent: "#061018",
                    selectionBackground: "rgba(109, 224, 255, 0.24)",
                    black: "#061018",
                    brightBlack: "#4b6977",
                    red: "#ff8b7f",
                    green: "#8df9d2",
                    yellow: "#ffd580",
                    blue: "#6de0ff",
                    magenta: "#bcadff",
                    cyan: "#7ae7ff",
                    white: "#f2fdff",
                },
            });
            const fitAddon = new window.FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(screen);

            let socket = null;
            let reconnectTimer = null;
            let reconnectDelay = 500;
            let manualClose = false;
            let hasRenderedOutput = false;
            const pendingMessages = [];

            const setViewportHeight = () => {
                const height = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                document.documentElement.style.setProperty("--app-height", `${height}px`);
                window.requestAnimationFrame(() => {
                    fitAddon.fit();
                    term.scrollToBottom();
                });
            };

            const showOverlay = (text) => {
                overlay.textContent = text;
                overlay.classList.remove("is-hidden");
            };

            const hideOverlay = () => {
                overlay.classList.add("is-hidden");
            };

            const normalizeOutput = (text) => (text || "").replace(/\r?\n/g, "\r\n");

            const writeOutput = (text, replace) => {
                if (replace) {
                    term.reset();
                    hasRenderedOutput = false;
                }
                if (!text) {
                    return;
                }
                term.write(normalizeOutput(text));
                hasRenderedOutput = true;
                term.scrollToBottom();
            };

            const setConnectionStatus = (text) => {
                footerStatus.textContent = text;
            };

            const applySnapshot = (payload) => {
                const active = !!payload.active;
                const profile = payload.profile || initialProfile;
                const program = payload.program || (active ? "shell" : "session closed");
                const cwd = payload.cwd || (active ? "-" : "not active");

                badgeProfile.textContent = profile;
                badgeActive.classList.toggle("is-live", active);
                statusLabel.textContent = active ? "active" : "idle";
                metaProgram.textContent = program;
                metaCwd.textContent = cwd;

                if (payload.replace) {
                    writeOutput(payload.output || "", true);
                } else if (payload.output) {
                    writeOutput(payload.output, false);
                }

                if (!hasRenderedOutput && active) {
                    term.writeln("\x1b[38;2;109;224;255mConnected. Waiting for output...\x1b[0m");
                    hasRenderedOutput = true;
                }

                if (active) {
                    manualClose = false;
                    setConnectionStatus("已连接");
                    hideOverlay();
                } else {
                    setConnectionStatus("会话已关闭");
                    showOverlay("当前会话未激活，点重连即可重新打开。");
                }
            };

            const logInfo = (text, color = "109;224;255") => {
                term.writeln(`\x1b[38;2;${color}m${text}\x1b[0m`);
                term.scrollToBottom();
                hasRenderedOutput = true;
            };

            const flushPendingMessages = () => {
                while (pendingMessages.length && socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify(pendingMessages.shift()));
                }
            };

            const websocketUrl = () => {
                const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
                return `${protocol}//${window.location.host}${wsPath}`;
            };

            const connectSocket = () => {
                if (socket && (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING)) {
                    return;
                }

                manualClose = false;
                setConnectionStatus("连接中...");
                showOverlay("正在连接终端...");

                socket = new WebSocket(websocketUrl());
                socket.addEventListener("open", () => {
                    reconnectDelay = 500;
                    setConnectionStatus("已连接");
                    flushPendingMessages();
                });

                socket.addEventListener("message", (event) => {
                    let payload = null;
                    try {
                        payload = JSON.parse(event.data);
                    } catch (error) {
                        logInfo("Invalid terminal payload.", "255;139;127");
                        return;
                    }

                    if (payload.event === "pong") {
                        return;
                    }

                    if (payload.ok === false) {
                        setConnectionStatus(payload.error || "终端错误");
                        showOverlay(payload.error || "终端请求失败。");
                        logInfo(`[error] ${payload.error || "Terminal request failed."}`, "255;139;127");
                        return;
                    }

                    applySnapshot(payload);
                });

                socket.addEventListener("close", () => {
                    socket = null;
                    if (!manualClose) {
                        scheduleReconnect();
                    }
                });

                socket.addEventListener("error", () => {
                    setConnectionStatus("连接异常");
                });
            };

            const scheduleReconnect = () => {
                if (manualClose || reconnectTimer) {
                    return;
                }
                setConnectionStatus("重连中...");
                showOverlay("连接中断，正在自动重连...");
                reconnectTimer = window.setTimeout(() => {
                    reconnectTimer = null;
                    connectSocket();
                    reconnectDelay = Math.min(reconnectDelay * 1.5, 4000);
                }, reconnectDelay);
            };

            const sendPayload = (payload) => {
                if (payload.action !== "close") {
                    manualClose = false;
                }
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify(payload));
                    return true;
                }
                pendingMessages.push(payload);
                connectSocket();
                return false;
            };

            const autosizeInput = () => {
                input.style.height = "46px";
                input.style.height = `${Math.min(input.scrollHeight, 92)}px`;
            };

            root.querySelectorAll("[data-key]").forEach((button) => {
                button.addEventListener("click", () => {
                    const key = button.dataset.key;
                    if (sendPayload({action: "key", key})) {
                        setConnectionStatus(`已发送 ${key}`);
                    } else {
                        setConnectionStatus("重连中...");
                    }
                    input.focus();
                });
            });

            root.querySelectorAll("[data-action]").forEach((button) => {
                button.addEventListener("click", () => {
                    const action = button.dataset.action;
                    if (action === "reconnect") {
                        sendPayload({action: "open", profile: badgeProfile.textContent || initialProfile});
                        input.focus();
                        return;
                    }
                    if (action === "close") {
                        manualClose = true;
                        sendPayload({action: "close"});
                        return;
                    }
                    if (action === "clear-screen") {
                        term.clear();
                        hasRenderedOutput = false;
                        setConnectionStatus("视图已清空");
                        return;
                    }
                });
            });

            form.addEventListener("submit", (event) => {
                event.preventDefault();
                const text = input.value.trim();
                if (!text) {
                    input.focus();
                    return;
                }
                sendPayload({action: "send", text});
                setConnectionStatus("命令已发送");
                input.value = "";
                autosizeInput();
                input.focus();
            });

            input.addEventListener("input", autosizeInput);
            input.addEventListener("keydown", (event) => {
                if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
                    event.preventDefault();
                    form.requestSubmit();
                }
            });

            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    return;
                }
                if (socket && socket.readyState === WebSocket.OPEN) {
                    socket.send(JSON.stringify({action: "ping"}));
                    return;
                }
                connectSocket();
            });

            window.addEventListener("pageshow", connectSocket);
            window.addEventListener("resize", setViewportHeight);
            if (window.visualViewport) {
                window.visualViewport.addEventListener("resize", setViewportHeight);
            }

            setViewportHeight();
            autosizeInput();
            if (!initialActive) {
                showOverlay("当前会话未激活，点重连开始新的终端会话。");
            }
            connectSocket();
            input.focus();
        })();
    </script>
</body>
</html>
