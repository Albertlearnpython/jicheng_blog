services:
  web:
    build:
      context: .
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    container_name: linuxclaw-web
    init: true
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${WEB_PORT:-80}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/", timeout=5)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
